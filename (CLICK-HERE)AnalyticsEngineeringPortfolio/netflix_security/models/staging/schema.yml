version: 2

models:
  - name: stg_login_events
    description: "Cleaned login attempt events from raw source data"
    columns:
      - name: event_id
        description: "Unique identifier for each login attempt"
        tests:
          - unique
          - not_null
      - name: user_id
        tests:
          - not_null
      - name: ip_address
        tests:
          - not_null

  - name: stg_request_logs
    description: "Cleaned HTTP request logs from raw source data"
    columns:
      - name: request_id
        description: "Unique identifier for each HTTP request"
        tests:
          - unique
          - not_null

  - name: stg_devices
    description: "Cleaned device registry — one row per device"
    columns:
      - name: device_id
        description: "Unique identifier for each device"
        tests:
          - unique
          - not_null
